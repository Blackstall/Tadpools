name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (shared → agents → api → web)
        run: npm run build

      - name: Typecheck all workspaces
        run: npm run typecheck

      - name: Run unit tests
        run: npm test
